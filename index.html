<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Legacy AR - Android Multi-Capture</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        #recording-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 70px; height: 70px; border-radius: 50%; background-color: #ff0000; border: 4px solid white; cursor: pointer; }
        #recording-btn.recording { background-color: #222; animation: pulse 1s infinite; border-color: #ff0000; }
        #flash-btn { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 50px; height: 50px; background-color: rgba(0,0,0,0.6); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }
        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(0.9); } }
    </style>
</head>
<body>
    <button id="recording-btn"></button>
    <div id="flash-btn">⚡</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
             renderer="colorManagement: true; alpha: true" vr-mode-ui="enabled: false">
        <a-assets>
            <video id="miVideo" src="video.mp4" loop="true" playsinline crossorigin="anonymous"></video>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 1"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 2"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 3"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 4"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 5"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById("recording-btn");
        const flashBtn = document.getElementById("flash-btn");
        let mediaRecorder, chunks = [], isRecording = false;

        btn.addEventListener("click", () => {
            if (!isRecording) {
                // Seleccionamos el elemento de video de la cámara que MindAR genera
                const camVideo = document.querySelector('video[autoplay]');
                const arCanvas = document.querySelector('canvas.a-canvas');
                
                // Creamos un canvas maestro para combinar ambos
                const masterCanvas = document.createElement('canvas');
                masterCanvas.width = camVideo.videoWidth;
                masterCanvas.height = camVideo.videoHeight;
                const ctx = masterCanvas.getContext('2d');

                // Bucle de dibujo (renderizado)
                function draw() {
                    if (!isRecording) return;
                    ctx.drawImage(camVideo, 0, 0, masterCanvas.width, masterCanvas.height);
                    ctx.drawImage(arCanvas, 0, 0, masterCanvas.width, masterCanvas.height);
                    requestAnimationFrame(draw);
                }
                
                const stream = masterCanvas.captureStream(24);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(blob);
                    a.download = "Legacy_Record_Pro.webm";
                    a.click();
                    chunks = [];
                };
                
                mediaRecorder.start();
                draw(); // Iniciamos el bucle de combinación
                isRecording = true;
                btn.classList.add("recording");
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove("recording");
            }
        });
    </script>
</body>
</html>
