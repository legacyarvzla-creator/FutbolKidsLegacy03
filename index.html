<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Legacy AR - FUTBOL KIDS Premium WebAR</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        /* Aumentamos z-index a 9999 para asegurar que el botón siempre responda al clic */
        #recording-btn { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            z-index: 9999; width: 70px; height: 70px; border-radius: 50%; 
            background-color: #ff0000; border: 4px solid white; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #recording-btn.recording { background-color: #222; animation: pulse 1s infinite; border-color: #ff0000; }
        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(0.9); } }
        .a-enter-vr { display: none !important; }
    </style>
</head>
<body>
    <button id="recording-btn"></button>
    
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
             renderer="colorManagement: true; alpha: true" vr-mode-ui="enabled: false">
        <a-assets>
            <video id="miVideo" src="video.mp4" loop="true" playsinline crossorigin="anonymous"></video>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 1"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 2"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 3"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 4"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 5"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById("recording-btn");
        const video = document.querySelector("#miVideo");
        let mediaRecorder, chunks = [], isRecording = false, audioCtx, mixer;

        // Configuración de targets
        document.querySelectorAll("[mindar-image-target]").forEach(target => {
            target.addEventListener("targetFound", () => video.play());
            target.addEventListener("targetLost", () => video.pause());
        });

        async function initAudio() {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                mixer = audioCtx.createMediaStreamDestination();
                const videoSource = audioCtx.createMediaElementSource(video);
                videoSource.connect(mixer);
                videoSource.connect(audioCtx.destination);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
                    audioCtx.createMediaStreamSource(stream).connect(mixer);
                } catch(e) { console.warn("Micrófono no disponible"); }
            }
            if(audioCtx.state === 'suspended') await audioCtx.resume();
        }

        btn.addEventListener("click", async () => {
            if (!isRecording) {
                await initAudio();
                const canvas = document.querySelector("canvas.a-canvas");
                const videoStream = canvas.captureStream(24);
                // Combinamos video del canvas + audio del mixer
                const stream = new MediaStream([...videoStream.getVideoTracks(), ...mixer.stream.getAudioTracks()]);
                
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(blob);
                    a.download = "Legacy_Record_" + Date.now() + ".webm";
                    a.click();
                    chunks = [];
                };
                mediaRecorder.start();
                isRecording = true;
                btn.classList.add("recording");
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove("recording");
            }
        });
    </script>
</body>
</html>
