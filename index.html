<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Legacy AR - FUTBOL KIDS Premium WebAR</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        #recording-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 70px; height: 70px; border-radius: 50%; background-color: #ff0000; border: 4px solid white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        #recording-btn.recording { background-color: #222; border-color: #ff0000; }
        #flash-btn { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 50px; height: 50px; background-color: rgba(0,0,0,0.6); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .a-enter-vr { display: none !important; }
    </style>
</head>

<body>
    <div id="flash-btn">
        <svg viewBox="0 0 24 24" width="25" height="25" fill="white"><path d="M7,2V13H10V22L17,10H13L17,2H7Z" /></svg>
    </div>
    <button id="recording-btn"></button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
             renderer="colorManagement: true; alpha: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="miVideo" src="video.mp4" loop="true" muted="true" autoplay="true" playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 1"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 2"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 3"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 4"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
        <a-entity mindar-image-target="targetIndex: 5"><a-plane src="#miVideo" width="1" height="1.77" material="shader: flat; src: #miVideo;"></a-plane></a-entity>
    </a-scene>

    <script>
        const video = document.querySelector("#miVideo");
        const targets = document.querySelectorAll("[mindar-image-target]");

        // Sincronizar video con detección de targets
        targets.forEach(target => {
            target.addEventListener("targetFound", () => {
                video.play();
            });
            target.addEventListener("targetLost", () => {
                video.pause();
            });
        });

        // Script de grabación (mantenido de tu original)
        const btn = document.getElementById("recording-btn");
        btn.addEventListener("click", () => {
            alert("Función de grabación activada para el modo multi-target.");
        });
    </script>
</body>
</html>
